---
- name: Instalar dependências necessárias
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
    state: present

- name: Adicionar chave GPG do Kubernetes
  apt_key:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present

- name: Adicionar repositório do Kubernetes
  apt_repository:
    repo: 'deb https://apt.kubernetes.io/ kubernetes-xenial main'
    state: present
    filename: 'kubernetes.list'

- name: Atualizar o cache do APT após adicionar o repositório
  apt:
    update_cache: yes

- name: Instalar pacotes do Kubernetes
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present

- name: Manter as versões dos pacotes do Kubernetes
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: hold

- name: Inicializar o cluster Kubernetes
  command: kubeadm init --apiserver-advertise-address=192.168.56.10 --pod-network-cidr=10.32.0.0/12
  args:
    creates: /etc/kubernetes/admin.conf

- name: Configurar o kubectl para o usuário vagrant
  become_user: vagrant
  shell: |
    mkdir -p $HOME/.kube
    sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
    sudo chown $(id -u):$(id -g) $HOME/.kube/config
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Instalar rede de pods (Weave Net)
  shell: |
    kubectl apply -f "https://cloud.weave.works/k8s/net?k8s-version=$(kubectl version | base64 | tr -d '\n')"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
