---
- name: Atualizar o cache do APT
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar pacotes básicos
  apt:
    name:
      - curl
      - wget
      - vim
      - git
    state: present

- name: Desativar swap
  command: swapoff -a
  ignore_errors: yes

- name: Remover entrada de swap do fstab
  replace:
    path: /etc/fstab
    regexp: '^(.*swap.*)$'
    replace: '# \1'
