# Number of Deployment replicas
replicaCount: 2

# Docker image configuration
image:
  repository: icl00ud/velure-auth
  pullPolicy: Always
  tag: "latest"

# Secrets for private registries (optional; empty for public)
imagePullSecrets: []

# Override default names
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Custom pod annotations and labels
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext: {}
securityContext: {}

# Service configuration (ClusterIP exposes the service internally)
service:
  type: ClusterIP
  port: 3020

# Ingress configuration
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/group.name: velure-public
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  hosts:
    - host: ""
      paths:
        - path: /api/auth
          pathType: Prefix
  tls: []

# Container CPU and memory resources
resources:
  limits:
    cpu: "250m"
    memory: "256Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 65

# Additional volumes (if needed)
volumes: []
volumeMounts: []

# Node selectors and tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# Redis configuration
redis:
  host: "velure-datastores-redis-master.datastores.svc.cluster.local"
  port: "6379"
  secretName: "velure-auth-redis"

# Secrets configuration (use existing secrets or allow creating externally)
secrets:
  postgres:
    url: "postgresql://auth_user:auth_password@postgres.datastores.svc.cluster.local:5432/velure_auth?sslmode=disable"
  jwt:
    secret: "velure-jwt-secret-key-change-in-production"
    expiresIn: "24h"
    refreshSecret: "velure-refresh-secret-key-change-in-production"
    refreshExpiresIn: "168h"
  session:
    secret: "velure-session-secret-key-change-in-production"
    expiresIn: "24h"

# Prometheus metrics configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      prometheus: kube-prometheus
